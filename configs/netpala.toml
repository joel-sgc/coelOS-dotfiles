# Netpala Configuration File
# Keybindings can be customized below.
# Available modifiers: ctrl, alt, shift
# Examples: "ctrl+c", "shift+tab", "alt+enter", "a", "up", "down", "left", "right"
# Special keys: enter, space (use " "), tab, backspace, delete, esc, up, down, left, right
# Multiple keys can be assigned to the same action.

[keybindings]
  [keybindings.up]
    keys = ["k", "up"]
    help = "Up"
  [keybindings.down]
    keys = ["j", "down"]
    help = "Down"
  [keybindings.next_pane]
    keys = ["tab"]
    help = "Next"
  [keybindings.prev_pane]
    keys = ["shift+tab"]
    help = "Prev"
  [keybindings.select]
    keys = ["enter", " "]
    help = "Dis/Connect"
  [keybindings.remove]
    keys = ["backspace", "delete"]
    help = "Remove"
  [keybindings.scan]
    keys = ["s"]
    help = "Scan"
  [keybindings.autoconnect]
   keys = ["a"]
   help = "Toggle Autoconnect"
  [keybindings.hidden]
    keys = ["h"]
    help = "Toggle Hidden"
  [keybindings.quit]
    keys = ["q", "ctrl+c", "ctrl+q", "ctrl+w"]
    help = "Quit"
  [keybindings.cancel]
    keys = ["esc"]
    help = "Cancel"

[colors]
  primary = "#a7abca"
  active = "#7acdcd"
  active_text = "#ff99da"
  selection_bg = "#7acdcd"
  inactive = "#444a66"
  error = "#ff0000"
  error_text = "#aa0000"
  help_text = "#a7abca"
